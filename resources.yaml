---

resources:
  build/native-build-headers:
    phases: native:install
    version: latest
    path: $RO_NATIVE

  build/native-build-tools:
    phases: install
    version: latest
    path: $ROTOOL_DIR

  build/root-env:
    phases: install
    version: latest
    path: $ROBUILD_DIR/Env

  build/build-libs:
    phases: install
    version: latest
    path: $EXPORTS_DIR


exports:
  build/crosscompile-cmunge:
    phases: native:install
    upload: false
    path: $ROTOOL_DIR
    files:
      - riscos-cmunge

  library/cmunge:
    phases: install
    newer: true
    path: $INSTALL_DIR/Library

